<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRACE.ID - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-dashboard.css">
</head>
<body>

    <div class="app-shell">
        
        <header class="topbar">
            <div class="topbar-brand">
                <span>SIM</span><span class="highlight">RACE</span><span>.ID</span>
            </div>
            <nav class="topbar-nav">
                <a href="#" class="active">Drive</a>
                <a href="#">Setup</a>
                <a href="#">Team</a>
                <a href="#">Settings</a>
            </nav>
            <div class="topbar-right">
                <button class="btn-logout">Logout</button>
            </div>
        </header>

        <main class="content-area">
            
            <section class="desktop-sidebar">
                <div class="profile-card">
                    <div class="profile-row">
                        <div class="avatar-wrap">
                            <div class="avatar">MV</div>
                        </div>
                        <div class="profile-info">
                            <h2 class="driver-name">MARCO VELOCE</h2>
                            <div class="badge-row">
                                <span class="badge-flag">🇮🇹</span>
                                <span class="badge-pro">PRO</span>
                                <span class="global-rank">Global Rank: #412</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-go-race">GO RACE 🏁</button>
                </div>
            </section>

            <section class="desktop-main">
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-content">
                            <span class="stat-label">WINS</span>
                            <span class="stat-value">24</span>
                            <span class="stat-sub green">+2 this week</span>
                        </div>
                        <div class="stat-icon">🏆</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-content">
                            <span class="stat-label">PODIUMS</span>
                            <span class="stat-value">58</span>
                            <span class="stat-sub text-muted">Top 15%</span>
                        </div>
                        <div class="stat-icon">🥇</div>
                    </div>
                </div>

                <div class="ratings-container">
                    <h3 class="section-title">DRIVER RATINGS 📈</h3>
                    <div class="ratings-card">
                        <div class="rating-row">
                            <div class="rating-header">
                                <span>SAFETY RATING (SR)</span>
                                <span class="highlight-orange">S 4.98</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 95%;"></div>
                            </div>
                        </div>
                        <div class="rating-row">
                            <div class="rating-header">
                                <span>DRIVER RATING (DR)</span>
                                <span class="highlight-orange">A+ 7,420</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 80%;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="licenses-container">
                    <h3 class="section-title">ACTIVE LICENSES</h3>
                    <div class="licenses-row">
                        <div class="license-card">
                            <div class="license-icon">👑</div>
                            <span class="license-label">LICENSE</span>
                            <span class="license-name">Pro Series</span>
                        </div>
                        <div class="license-card">
                            <div class="license-icon">⏳</div>
                            <span class="license-label">LICENSE</span>
                            <span class="license-name">Endurance A</span>
                        </div>
                    </div>
                </div>

            </section>

        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <span class="nav-icon">🏎️</span>
                <span class="nav-label">DRIVE</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">🔧</span>
                <span class="nav-label">SETUP</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">👥</span>
                <span class="nav-label">TEAM</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">SETTINGS</span>
            </a>
        </nav>

    </div>

</body>
</html>
